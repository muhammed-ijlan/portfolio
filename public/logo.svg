<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Import Poppins font directly into the SVG -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500&amp;display=swap');
      
      .text-base {
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
        font-size: 110px;
      }
      
      .text-ijlan {
        letter-spacing: -0.04em;
      }
      
      .text-dev {
        letter-spacing: -0.05em;
        fill: #d0c8e5;
      }
    </style>
    
    <!-- This mask cuts out the shape of the 'ijlan' text -->
    <mask id="ijlan-mask">
      <text x="60" y="130" class="text-base text-ijlan" fill="white">ijlan</text>
    </mask>
  </defs>

  <!-- The Animated Spinning Gradient (Masked by the text) -->
  <g mask="url(#ijlan-mask)">
    <g>
      <!-- Animates the rotation of the color slices continuously -->
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 180 100" 
        to="360 180 100" 
        dur="5s" 
        repeatCount="indefinite" 
      />
      
      <!-- 6 mathematically calculated circle segments that create a solid pie chart -->
      <!-- Center (180, 100) aligns roughly with the center of the 'ijlan' text -->
      <circle cx="180" cy="100" r="200" fill="none" stroke="#fc167e" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(0 180 100)" />
      <circle cx="180" cy="100" r="200" fill="none" stroke="#f95e51" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(60 180 100)" />
      <circle cx="180" cy="100" r="200" fill="none" stroke="#fbb336" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(120 180 100)" />
      <circle cx="180" cy="100" r="200" fill="none" stroke="#fc167e" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(180 180 100)" />
      <circle cx="180" cy="100" r="200" fill="none" stroke="#f95e51" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(240 180 100)" />
      <circle cx="180" cy="100" r="200" fill="none" stroke="#fbb336" stroke-width="400" stroke-dasharray="211 1256.64" transform="rotate(300 180 100)" />
    </g>
  </g>

  <!-- 
    The Static Text Overlay 
    'ijlan' is set to fill="none" so it acts as an invisible spacer, 
    perfectly pushing '.dev' into the correct spot!
  -->
  <text x="60" y="130" class="text-base">
    <tspan class="text-ijlan" fill="none">ijlan</tspan><tspan class="text-dev" dx="-5.5">.dev</tspan>
  </text>

</svg>